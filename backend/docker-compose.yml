services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: revleak
      POSTGRES_PASSWORD: revleak
      POSTGRES_DB: revleak
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revleak -d revleak"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://revleak:revleak@db:5432/revleak
      PAGESPEED_API_KEY: ${PAGESPEED_API_KEY:-}
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
